name: Release to PyPI

# Builds the package and publishes it to PyPI whenever a GitHub Release is
# published (the Release is created by bump.yml via commitizen). Can also be
# run manually.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token required.
# Configure a trusted publisher for this repo/workflow at
# https://pypi.org/manage/project/agent-signing/settings/publishing/
# Alternatively, set a PYPI_API_TOKEN secret and pass it as `password` to the
# publish step below.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build distribution

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/project/agent-signing/

    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
