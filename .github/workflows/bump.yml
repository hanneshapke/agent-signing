name: Bump version

# Runs commitizen on every push to main. Based on the Conventional Commits
# since the last tag it bumps the version in pyproject.toml, updates the
# CHANGELOG, commits, tags (vX.Y.Z) and creates a GitHub Release. The
# published release triggers release.yml which builds and publishes to PyPI.
#
# For the published Release to trigger release.yml, the steps below must
# authenticate with a Personal Access Token stored as the PERSONAL_ACCESS_TOKEN
# secret (events created with the default GITHUB_TOKEN do not start new runs).
# Without it the bump still works, but you must publish the release manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    name: Commitizen bump
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create bump and changelog
        id: cz
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          changelog_increment_filename: _changelog_increment.md
          push: true
          commit: true
          changelog: true

      - name: Create GitHub Release
        if: steps.cz.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.cz.outputs.version }}" \
            --title "v${{ steps.cz.outputs.version }}" \
            --notes-file _changelog_increment.md
